<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin · Porra Mundial 2026</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
</head>
<body class="bg-light">
<div class="container" style="max-width:360px;margin-top:120px">
  <div class="card shadow-sm">
    <div class="card-header bg-success text-white fw-bold">&#x26BD; Admin · Porra Mundial 2026</div>
    <div class="card-body">
      {% if error %}
      <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Contrasenya</label>
          <input type="password" name="password" class="form-control" autofocus />
        </div>
        <button type="submit" class="btn btn-success w-100">Entrar</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
