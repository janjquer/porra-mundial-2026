<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Porra Mundial 2026</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" />
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; }
    .nav-pills .nav-link.active { background-color: #198754; }
    .nav-pills .nav-link { color: #198754; }
    .delta-up   { color: #198754; font-weight: 600; }
    .delta-down { color: #dc3545; font-weight: 600; }
    .delta-zero { color: #6c757d; }
    .badge-clavat { background: #ffc107; color: #000; font-weight: 700; }
    .match-select { max-width: 400px; }
    #spinner { display: none; }
    .last-update { font-size: .8rem; color: #6c757d; }
    td, th { vertical-align: middle !important; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-success mb-4">
  <div class="container">
    <span class="navbar-brand">&#x26BD; Porra Mundial 2026</span>
    <span class="last-update text-white-50" id="lastUpdate">carregant...</span>
  </div>
</nav>

<div class="container pb-5">

  <!-- Tabs -->
  <ul class="nav nav-pills mb-4 flex-wrap gap-1" id="mainTabs" role="tablist">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-standings">Classificació</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-daily">Avui</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-clavats">Clavats</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-match">Per Partit</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-results">Resultats</button></li>
  </ul>

  <div class="tab-content">

    <!-- Classificació -->
    <div class="tab-pane fade show active" id="tab-standings">
      <div class="card shadow-sm">
        <div class="card-header bg-success text-white fw-bold">Classificació General</div>
        <div class="card-body">
          <table id="tbl-standings" class="table table-hover table-sm w-100">
            <thead><tr>
              <th>#</th><th>Nom</th><th>Punts</th>
              <th title="Canvi de posició últimes 24h">Pos ±</th>
              <th title="Punts guanyats últimes 24h">Pts ±</th>
            </tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Avui -->
    <div class="tab-pane fade" id="tab-daily">
      <div class="card shadow-sm">
        <div class="card-header bg-success text-white fw-bold">Classificació Últimes 24h</div>
        <div class="card-body">
          <table id="tbl-daily" class="table table-hover table-sm w-100">
            <thead><tr><th>#</th><th>Nom</th><th>Punts avui</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Clavats -->
    <div class="tab-pane fade" id="tab-clavats">
      <div class="card shadow-sm">
        <div class="card-header bg-success text-white fw-bold">Rànquing Clavats (15 pts)</div>
        <div class="card-body">
          <table id="tbl-clavats" class="table table-hover table-sm w-100">
            <thead><tr><th>#</th><th>Nom</th><th>Clavats</th><th>Primer</th><th>Últim</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Per Partit -->
    <div class="tab-pane fade" id="tab-match">
      <div class="card shadow-sm">
        <div class="card-header bg-success text-white fw-bold">Pronòstics per Partit</div>
        <div class="card-body">
          <div class="row g-2 mb-3 align-items-end">
            <div class="col-auto">
              <label class="form-label fw-semibold">Grup</label>
              <select id="grupFilter" class="form-select form-select-sm">
                <option value="">Tots</option>
                {% for g in grups %}
                <option value="{{ g }}">Grup {{ g }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col match-select">
              <label class="form-label fw-semibold">Partit</label>
              <select id="matchSelect" class="form-select form-select-sm">
                <option value="">Selecciona un partit...</option>
                {% for p in partits %}
                <option value="{{ p.n_partit }}" data-grup="{{ p.grup }}">{{ p.n_partit }}. {{ p.partit }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
          <div id="matchResult" class="mb-2 fw-bold"></div>
          <table id="tbl-match" class="table table-hover table-sm w-100">
            <thead><tr><th>Resultat</th><th>Pronòstics</th><th>Punts</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Resultats -->
    <div class="tab-pane fade" id="tab-results">
      <div class="card shadow-sm">
        <div class="card-header bg-success text-white fw-bold">Resultats dels Partits</div>
        <div class="card-body">
          <div class="mb-2">
            <select id="grupResultFilter" class="form-select form-select-sm" style="max-width:200px">
              <option value="">Tots els grups</option>
              {% for g in grups %}
              <option value="{{ g }}">Grup {{ g }}</option>
              {% endfor %}
            </select>
          </div>
          <table id="tbl-results" class="table table-hover table-sm w-100">
            <thead><tr><th>Data</th><th>Grup</th><th>Partit</th><th>Resultat</th><th>Clavats</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

  </div><!-- tab-content -->
</div><!-- container -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
<script>
const fmt = new Intl.DateTimeFormat('ca', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });

function deltaHtml(n) {
  if (n > 0) return `<span class="delta-up">▲${n}</span>`;
  if (n < 0) return `<span class="delta-down">▼${Math.abs(n)}</span>`;
  return `<span class="delta-zero">—</span>`;
}

// ── Standings ────────────────────────────────────────────────────────────────
const dtStandings = $('#tbl-standings').DataTable({
  columns: [
    { data: 'posicio', width: '3rem' },
    { data: 'nom' },
    { data: 'puntuacio' },
    { data: 'dif_pos', render: (d) => deltaHtml(d) },
    { data: 'dif_punts', render: (d) => deltaHtml(d) },
  ],
  order: [[0, 'asc']],
  pageLength: 25,
  language: { search: 'Cerca:', lengthMenu: 'Mostra _MENU_', info: 'Mostrant _START_-_END_ de _TOTAL_', paginate: { next: 'Seg', previous: 'Ant' } },
});

// ── Daily ────────────────────────────────────────────────────────────────────
const dtDaily = $('#tbl-daily').DataTable({
  columns: [
    { data: 'posicio', width: '3rem' },
    { data: 'nom' },
    { data: 'puntuacio' },
  ],
  order: [[0, 'asc']],
  pageLength: 25,
  language: { search: 'Cerca:', lengthMenu: 'Mostra _MENU_', info: 'Mostrant _START_-_END_ de _TOTAL_', paginate: { next: 'Seg', previous: 'Ant' } },
});

// ── Clavats ───────────────────────────────────────────────────────────────────
const dtClavats = $('#tbl-clavats').DataTable({
  columns: [
    { data: null, render: (d, t, r, m) => m.row + 1, orderable: false, width: '3rem' },
    { data: 'nom' },
    { data: 'clavats' },
    { data: 'primer', render: (d) => d ? fmt.format(new Date(d)) : '—' },
    { data: 'ultim', render: (d) => d ? fmt.format(new Date(d)) : '—' },
  ],
  order: [[2, 'desc']],
  pageLength: 25,
  language: { search: 'Cerca:', lengthMenu: 'Mostra _MENU_', info: 'Mostrant _START_-_END_ de _TOTAL_', paginate: { next: 'Seg', previous: 'Ant' } },
});

// ── Per Partit ────────────────────────────────────────────────────────────────
const dtMatch = $('#tbl-match').DataTable({
  columns: [
    { data: 'resultat' },
    { data: 'n' },
    { data: 'punts', render: (d) => d !== null && d !== undefined ? d : '—' },
  ],
  order: [[1, 'desc']],
  paging: false,
  searching: false,
  info: false,
  language: { emptyTable: 'Selecciona un partit per veure els pronòstics.' },
});

function loadMatch(nPartit) {
  if (!nPartit) return;
  fetch(`/api/match/${nPartit}`)
    .then(r => r.json())
    .then(data => {
      document.getElementById('matchResult').textContent = '';
      dtMatch.clear();
      dtMatch.rows.add(data.predictions);
      dtMatch.draw();
    });
}

document.getElementById('grupFilter').addEventListener('change', function() {
  const grup = this.value;
  const sel = document.getElementById('matchSelect');
  Array.from(sel.options).forEach(o => {
    o.hidden = grup ? o.dataset.grup !== grup : false;
  });
  sel.value = '';
  dtMatch.clear().draw();
  document.getElementById('matchResult').textContent = '';
});

document.getElementById('matchSelect').addEventListener('change', function() {
  loadMatch(this.value);
});

// ── Resultats ─────────────────────────────────────────────────────────────────
const dtResults = $('#tbl-results').DataTable({
  columns: [
    { data: 'dia', render: (d) => d ? fmt.format(new Date(d)) : '—' },
    { data: 'grup' },
    { data: 'partit' },
    { data: 'resultat', render: (d) => d ? `<strong>${d}</strong>` : '<span class="text-muted">pendent</span>' },
    { data: 'clavats', render: (d) => d > 0 ? `<span class="badge badge-clavat">${d}</span>` : d },
  ],
  order: [[0, 'asc']],
  pageLength: 25,
  language: { search: 'Cerca:', lengthMenu: 'Mostra _MENU_', info: 'Mostrant _START_-_END_ de _TOTAL_', paginate: { next: 'Seg', previous: 'Ant' } },
});

document.getElementById('grupResultFilter').addEventListener('change', function() {
  dtResults.column(1).search(this.value).draw();
});

// ── Load all data ────────────────────────────────────────────────────────────
function loadAll() {
  fetch('/api/standings').then(r => r.json()).then(data => {
    dtStandings.clear(); dtStandings.rows.add(data); dtStandings.draw();
  });
  fetch('/api/daily').then(r => r.json()).then(data => {
    dtDaily.clear(); dtDaily.rows.add(data); dtDaily.draw();
  });
  fetch('/api/clavats').then(r => r.json()).then(data => {
    dtClavats.clear(); dtClavats.rows.add(data); dtClavats.draw();
  });
  fetch('/api/matches').then(r => r.json()).then(data => {
    dtResults.clear(); dtResults.rows.add(data); dtResults.draw();
  });
  fetch('/api/last-update').then(r => r.json()).then(data => {
    const el = document.getElementById('lastUpdate');
    if (data.last_update) {
      el.textContent = `Actualitzat: ${fmt.format(new Date(data.last_update))} · ${data.n_matches} partits`;
    }
  });
}

loadAll();
setInterval(loadAll, 5 * 60 * 1000); // refresh every 5 min
</script>
</body>
</html>
